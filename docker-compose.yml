# docker-compose.yml
version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: llmeval
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: .
    ports: ["8000:8000"]
    depends_on: [db, redis]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/llmeval
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: sk-proj-xxx  # Replace
    volumes:
      - sessions_data:/data/sessions
volumes:
  pgdata:
  sessions_data:
